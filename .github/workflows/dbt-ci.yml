name: dbt CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: snowflake/swiftcart_analytics

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.12 dbt-snowflake==1.11.6

      - name: Install dbt packages
        run: dbt deps

      - name: Create Snowflake private key
        shell: bash
        run: |
          printf '%s' "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > rsa_key.p8
          chmod 600 rsa_key.p8

      - name: Create dbt CI profile
        shell: bash
        run: |
          mkdir -p ~/.dbt

          cat > ~/.dbt/profiles.yml <<EOF
          swiftcart_analytics:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                private_key_path: "${{ github.workspace }}/snowflake/swiftcart_analytics/rsa_key.p8"
                role: "${{ secrets.SNOWFLAKE_ROLE }}"
                database: "${{ secrets.SNOWFLAKE_DATABASE }}"
                warehouse: "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
                schema: ANALYTICS_CI
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Test Snowflake connection
        run: dbt debug --target ci

      - name: Build and test dbt project
        run: dbt build --target ci